# VPS-Reverse-Proxy für den CAD-Service (Muster wie Invox/Mustang).
# Auf Hostinger-VPS nach /etc/nginx/sites-available/ kopieren, SSL via certbot.

server {
    listen 80;
    server_name cad.fitpart.app;
    # certbot ergänzt 443 + Zertifikatspfade.

    # CAD-Generierung kann einige Sekunden dauern.
    proxy_read_timeout 60s;
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-Limiting (Zone in nginx.conf http{}: limit_req_zone ... zone=cad:10m rate=10r/s;)
    location /generate {
        limit_req zone=cad burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
