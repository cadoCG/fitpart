# Lokales Setup: CAD-Service. Web läuft separat via `pnpm dev` (Vercel-Ziel).
services:
  cad:
    build:
      context: ../services/cad
    image: fitpart-cad:dev
    ports:
      # Nur Loopback: auf dem VPS erreicht den Service ausschliesslich nginx
      # (TLS + Rate-Limit); lokal bleibt http://localhost:8000 nutzbar.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Shared-Secret-Härtung (Vercel ↔ CAD): auf dem VPS in einer .env neben
      # dieser Datei setzen (CAD_SHARED_SECRET=…). Leer = Schutz aus (lokal).
      - CAD_SHARED_SECRET=${CAD_SHARED_SECRET:-}
